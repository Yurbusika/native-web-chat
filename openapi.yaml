openapi: 3.0.3
info:
  title: native-web-chat API
  description: |
    HTTP API и статические HTML-страницы приложения «native-web-chat».

    **Авторизация:** после успешного `POST /api/login` сервер выставляет HttpOnly-cookie `session`
    (срок жизни по умолчанию 7 дней, см. `SESSION_MAX_AGE_SEC`). Защищённые маршруты требуют эту cookie.

    Тела запросов к `/api/*` (кроме GET/DELETE без тела) ожидаются в формате JSON (`Content-Type: application/json`).

    **Сообщения:** операции с сообщениями доступны по путям `/api/chats/{chatId}/messages` (только для участников чата).

    **Пользователи:** `GET /api/users?name=...` — поиск по подстроке `username` (требуется сессия).
  version: 1.0.0

servers:
  - url: 'http://{host}:{port}'
    description: 'Локальный сервер (переменные .env — HOST, PORT)'
    variables:
      host:
        default: localhost
      port:
        default: '3000'

tags:
  - name: Auth
    description: Регистрация, вход, выход
  - name: Users
    description: Поиск пользователей по имени (для выбора собеседника и т.п.)
  - name: Chats
    description: Личные чаты 1-к-1 (участник — текущий пользователь и собеседник)
  - name: Messages
    description: Сообщения внутри чата (только для участников)
  - name: Pages
    description: HTML-страницы для браузера

paths:
  /api/registration:
    post:
      tags: [Auth]
      summary: Регистрация пользователя
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              default:
                value:
                  username: alice
                  password: secret
      responses:
        '200':
          description: Пользователь создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '400':
          description: Некорректные данные или имя уже занято
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                invalid:
                  value:
                    error: Некорректные данные для регистрации
                duplicate:
                  value:
                    error: Пользователь с таким именем уже существует

  /api/login:
    post:
      tags: [Auth]
      summary: Вход и установка сессии
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Успешный вход; в заголовке ответа приходит `Set-Cookie` с токеном сессии
          headers:
            Set-Cookie:
              description: |
                Cookie `session=<token>`; атрибуты Path=/, HttpOnly, SameSite=Lax;
                в production дополнительно Secure.
              schema:
                type: string
                example: session=abc123; Max-Age=604800; Path=/; HttpOnly; SameSite=Lax
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '401':
          description: Неверные учётные данные
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                default:
                  value:
                    error: Неверное имя пользователя или пароль

  /api/users:
    get:
      tags: [Users]
      summary: Найти пользователя по подстроке имени
      description: |
        Поиск через SQL `LIKE` (`%name%`); из результатов выбирается одна строка (`db.get`), порядок не гарантируется.
        Если параметр `name` отсутствует или пустой, возвращается 400.
        При отсутствии совпадений в текущей реализации возможен ответ 200 с пустым телом (не JSON).
      operationId: findUsersByName
      security:
        - cookieAuth: []
      parameters:
        - name: name
          in: query
          required: true
          description: Подстрока для поиска по полю `username` (без автоматического URL-decode в сервере — передавайте значение в query как есть)
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: |
            При нахождении совпадения — JSON `{ id, username }`.
            Если совпадений нет, тело ответа может быть пустым.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserPublic'
        '400':
          description: Не указано или пустое имя для поиска
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
              examples:
                default:
                  value:
                    error: Некорректное имя пользователя
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/logout:
    post:
      tags: [Auth]
      summary: Выход (инвалидация сессии и очистка cookie)
      operationId: logoutUser
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Сессия удалена
          headers:
            Set-Cookie:
              description: Очистка cookie сессии (Max-Age=0)
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [message]
                properties:
                  message:
                    type: string
                    example: Вы успешно вышли из системы
        '401':
          description: Нет или недействительная сессия
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'

  /api/chats:
    get:
      tags: [Chats]
      summary: Список чатов текущего пользователя
      operationId: listChats
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Массив чатов, отсортированных по `updated_at` убыванию
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatWithPeer'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Chats]
      summary: Создать чат 1-к-1 с пользователем или вернуть существующий
      operationId: createChat
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChatRequest'
      responses:
        '201':
          description: Новый чат создан
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatResultNew'
        '200':
          description: Такой чат между двумя пользователями уже был — возвращается его id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateChatResultExisting'
        '400':
          description: |
            Некорректное тело JSON, невалидный `peerId`, попытка чата с собой.
            Примеры: «Некорректное тело запроса», «Укажите peerId собеседника», «Нельзя создать чат с самим собой».
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Пользователь с указанным peerId не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chats/{id}:
    parameters:
      - $ref: '#/components/parameters/ChatId'
    get:
      tags: [Chats]
      summary: Детали чата по id (только если пользователь — участник)
      operationId: getChatById
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Чат найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatWithPeer'
        '400':
          description: Некорректный id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Чат не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

    put:
      tags: [Chats]
      summary: Отметить чат прочитанным для текущего пользователя
      description: |
        Сбрасывает `has_unread` для участника-запрашивающего и возвращает актуальное состояние чата
        (как у `GET /api/chats/{id}`).
      operationId: markChatRead
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Обновлённое состояние чата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatWithPeer'
        '400':
          description: Некорректный id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Чат не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

    delete:
      tags: [Chats]
      summary: Удалить чат (каскадно по схеме БД)
      operationId: deleteChat
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Чат удалён
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Некорректный id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Чат не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chats/{chatId}/messages:
    parameters:
      - $ref: '#/components/parameters/ChatIdInMessagesPath'
    get:
      tags: [Messages]
      summary: Список сообщений чата
      description: Сообщения в порядке хранения в БД (обычно по возрастанию `created_at`).
      operationId: listMessagesByChat
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Массив сообщений
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          description: Некорректный идентификатор чата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Чат не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

    post:
      tags: [Messages]
      summary: Отправить сообщение в чат
      operationId: createMessage
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
            examples:
              default:
                value:
                  body: Привет!
      responses:
        '201':
          description: Сообщение сохранено
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageCreateResult'
        '400':
          description: Некорректный идентификатор чата
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Чат не найден
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/chats/{chatId}/messages/{messageId}:
    parameters:
      - $ref: '#/components/parameters/ChatIdInMessagesPath'
      - $ref: '#/components/parameters/MessageId'
    delete:
      tags: [Messages]
      summary: Удалить сообщение по id
      operationId: deleteMessage
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Сообщение удалено
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok:
                    type: boolean
                    example: true
        '400':
          description: Некорректные идентификаторы
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '404':
          description: Чат не найден или сообщение не найдено (в т.ч. сообщение из другого чата)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorMessage'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /:
    get:
      tags: [Pages]
      summary: Главная (лендинг)
      operationId: getLandingPage
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

  /login:
    get:
      tags: [Pages]
      summary: Страница входа
      operationId: getLoginPage
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

  /registration:
    get:
      tags: [Pages]
      summary: Страница регистрации
      operationId: getRegistrationPage
      responses:
        '200':
          description: HTML
          content:
            text/html:
              schema:
                type: string

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session
      description: Идентификатор сессии после успешного логина

  parameters:
    ChatId:
      name: id
      in: path
      required: true
      description: Идентификатор чата (положительное целое)
      schema:
        type: integer
        minimum: 1

    ChatIdInMessagesPath:
      name: chatId
      in: path
      required: true
      description: Идентификатор чата (положительное целое)
      schema:
        type: integer
        minimum: 1

    MessageId:
      name: messageId
      in: path
      required: true
      description: Идентификатор сообщения (положительное целое)
      schema:
        type: integer
        minimum: 1

  responses:
    Unauthorized:
      description: Не авторизован
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorMessage'
          examples:
            default:
              value:
                error: Не авторизован

  schemas:
    ErrorMessage:
      type: object
      required: [error]
      properties:
        error:
          type: string

    UserPublic:
      type: object
      required: [id, username]
      properties:
        id:
          type: integer
          example: 1
        username:
          type: string
          example: alice

    RegisterRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
          format: password

    ChatWithPeer:
      type: object
      description: Чат с данными о собеседнике относительно текущего пользователя
      required:
        - id
        - created_at
        - updated_at
        - has_unread
        - peer_id
        - peer_username
      properties:
        id:
          type: integer
        created_at:
          type: integer
          description: Unix-время в миллисекундах
        updated_at:
          type: integer
          description: Unix-время в миллисекундах
        has_unread:
          type: integer
          description: 0 или 1 (SQLite)
          enum: [0, 1]
        peer_id:
          type: integer
        peer_username:
          type: string

    CreateChatRequest:
      type: object
      required: [peerId]
      properties:
        peerId:
          type: integer
          minimum: 1
          description: id пользователя-собеседника

    CreateChatResultNew:
      type: object
      required: [id, existed]
      properties:
        id:
          type: integer
        existed:
          type: boolean
          enum: [false]

    CreateChatResultExisting:
      type: object
      required: [id, existed]
      properties:
        id:
          type: integer
        existed:
          type: boolean
          enum: [true]

    Message:
      type: object
      description: |
        Запись из таблицы `messages`.
        В ответе `GET /api/chats/{chatId}/messages` дополнительно приходит `senderName` (JOIN с `users`).
      required:
        - id
        - chat_id
        - sender_id
        - body
        - created_at
      properties:
        id:
          type: integer
        chat_id:
          type: integer
        sender_id:
          type: integer
        body:
          type: string
        created_at:
          type: integer
          description: Unix-время в миллисекундах
        senderName:
          type: string
          description: Имя отправителя (только в списке сообщений чата)

    CreateMessageRequest:
      type: object
      required: [body]
      properties:
        body:
          type: string
          description: Текст сообщения

    MessageCreateResult:
      type: object
      description: |
        Результат `INSERT` через SQLite (`run`); при расширении API может быть заменён полной моделью `Message`.
      required: [lastID, changes]
      properties:
        lastID:
          type: integer
          description: id вставленной строки (lastID из SQLite run)
        changes:
          type: integer
          description: Число затронутых строк

security: []
