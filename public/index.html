<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IQChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
    <link rel="stylesheet" type="text/css" href="/styles/main.css" />
    <link rel="stylesheet" type="text/css" href="/styles/hero.css" />
    <link rel="stylesheet" type="text/css" href="/styles/header.css" />
    <link rel="stylesheet" type="text/css" href="/styles/features.css" />
  </head>
  <body>
    <div class="landing__container">

      <header class="header">

        <div class="header__content">

          <div class="header__logo">

            <a class="logo__link" href="#">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path opacity="0.5" d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39939 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88837 21.6244 10.4003 22 12 22Z" fill="#ffb2c2"/>
                <path d="M7.5 11.1093C7.5 12.4777 8.81884 13.9135 10.0286 14.9426C10.8524 15.6435 11.2644 15.9939 12 15.9939C12.7356 15.9939 13.1476 15.6435 13.9714 14.9426C15.1812 13.9135 16.5 12.4777 16.5 11.1093C16.5 8.43212 14.0249 7.4326 12 9.50069C9.97507 7.4326 7.5 8.43212 7.5 11.1093Z" fill="#ffb2c2"/>
              </svg>
              <span>IQChat</span>
            </a>

          </div>

          <nav class="header__navigation">

            <ul class="navigation__content">
              <li class="navigation__link">
                <a class="link-underlined" href="#about">О проекте</a>
              </li>
              <li class="navigation__link">
                <a class="link-underlined" href="#features">Функции</a>
              </li>
              <li class="navigation__link">
                <a class="link-underlined" href="#team">Команда</a>
              </li>
            </ul>

          </nav>

          <div class="header__authorization">

            <a href="/login" class="btn login-btn">
              <span>Войти</span>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M7 12H17M17 12L13 8M17 12L13 16" stroke="#ffb2c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </a>

            <a href="/registration" class="btn registration-btn">
              <span>Регистрация</span>
              <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M2 9.1371C2 14 6.01943 16.5914 8.96173 18.9109C10 19.7294 11 20.5 12 20.5C13 20.5 14 19.7294 15.0383 18.9109C17.9806 16.5914 22 14 22 9.1371C22 4.27416 16.4998 0.825464 12 5.50063C7.50016 0.825464 2 4.27416 2 9.1371Z" fill="#ffb2c2"/>
              </svg>
            </a>

          </div>

        </div>
      </header>

      <main>
        <section class="hero">
          <div class="hero__content">
            <!-- Заголовок и возможно описание -->
            <h1></h1>
            <a class="btn" href="">Начать общаться</a>
          </div>
        </section>

        <section class="about" id="about">
          <!-- Описание -->
        </section>

        <section class="features" id="features">
          <div class="features__content">
            <h2 class="features__header">Преимущества чата</h2>

            <div class="slider__row">
              <ul class="slider__line">
                <li class="card">
                  <p>Реалтайм сообщения</p>
                </li>
                <li class="card">
                  <p>История сообщений</p>
                </li>
                <li class="card">
                  <p>Авторизация</p>
                </li>
                <li class="card">
                  <p>Адаптивность</p>
                </li>
                <li class="card">
                  <p>Выбор темы</p>
                </li>
              </ul>
            </div>

            <div class="slider__button_container">
              <button class="slider__button slicer__button_prev">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M13.5 7H1M1 7L7 1M1 7L7 13" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
              <button class="slider__button slicer__button_next">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <path d="M1 7H13.5M13.5 7L7.5 1M13.5 7L7.5 13" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"></path>
                </svg>
              </button>
            </div>
          </div>
          
        </section>

        <section class="demo">
          <!-- гифку с работой чата -->
        </section>

        <section class="stack"></section>

        <section class="team" id="team"></section>

        <section class="cta"></section>
      </main>
      
      <footer></footer>
    </div>
  </body>
</html>
