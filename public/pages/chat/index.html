<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IQChat</title>
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/pages/chat/css/styles.css" />
    <script type="module" src="/pages/chat/js/chat.js" defer></script>
  </head>
  <body>
    <div class="container">

      <aside class="sidebar">

        <header class="sidebar__header">

          <div class="header__container">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path opacity="0.5" d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39939 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88837 21.6244 10.4003 22 12 22Z" fill="#ffb2c2"/>
              <path d="M7.5 11.1093C7.5 12.4777 8.81884 13.9135 10.0286 14.9426C10.8524 15.6435 11.2644 15.9939 12 15.9939C12.7356 15.9939 13.1476 15.6435 13.9714 14.9426C15.1812 13.9135 16.5 12.4777 16.5 11.1093C16.5 8.43212 14.0249 7.4326 12 9.50069C9.97507 7.4326 7.5 8.43212 7.5 11.1093Z" fill="#ffb2c2"/>
            </svg>
  
            <!--TODO:-->
             <h2 class="profile__name"></h2>
          </div>
          
        </header>

        <div class="chats__container">

          <form class="chats__search" id="searchUserForm">
            <input 
            class="input search__input" 
              type="text" 
              id="searchUserInput" 
              name="username" 
              placeholder="Введите имя" 
              autocomplete="off"
            >

            <button class="search__btn" type="submit">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M15.7955 15.8111L21 21M18 10.5C18 14.6421 14.6421 18 10.5 18C6.35786 18 3 14.6421 3 10.5C3 6.35786 6.35786 3 10.5 3C14.6421 3 18 6.35786 18 10.5Z" stroke="#000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </form>

          <div class="chats__list"></div>

          <div class="chats__list_blank">
            <img src="../../assets/images/blank.jpg" width="200" height=200" alt="cat">
            <p>У вас пока нет чатов...</p>
          </div>

        </div>
      </aside>

      <main class="chat__container">
        <header class="chat__header">
          <div class="chat__info">
            <h3>Артем</h3>
          </div>
        </header>

        <div class="chat__window">
          
          <div class="chat__message">
            <h3 class="message__sender"></h3>
            <p class="message__text">Привет! Как дела?1</p>
            <span class="message__timestamp"></span>
          </div>

          <div class="chat__message">
            <h3 class="message__sender"></h3>
            <p class="message__text">Привет! Как дела?2</p>
            <span class="message__timestamp"></span>
          </div>

        </div>

        <form class="chat__input_form">
          <input type="text" class="chat__input" required placeholder="Введите сообщение">
          <button type="submit" class="input_btn">
            <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M1 7H13.5M13.5 7L7.5 1M13.5 7L7.5 13" stroke="#fff" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
          </button>
        </form>
      </main>
    </div>
  </body>
</html>
