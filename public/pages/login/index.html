<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="/src/theme/shell-theme.js"></script>
    <title>Вход</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/header.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/pages/login/css/styles.css" />
    <script type="module" src="/pages/login/js/login.js" defer></script>
  </head>
  <body>
      <header class="header">

      <div class="header__content">
        <div class="header__logo">
          <a class="logo__link" href="/">
            <img width="62" height="62"  src="./assets/icons/logo.png" alt="flamiGo">

            <span>Flamigo Chatty</span>
          </a>
        </div>

        <div class="header__authorization">
          <button type="button" class="theme-toggle" data-theme-toggle aria-pressed="false" aria-label="Включить тёмную тему">
            <span class="theme-toggle__icon theme-toggle__icon--light" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
            </span>
            <span class="theme-toggle__icon theme-toggle__icon--dark" aria-hidden="true">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </span>
          </button>
          <a href="/registration" class="btn registration-btn">
            <span>Регистрация</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M2 9.1371C2 14 6.01943 16.5914 8.96173 18.9109C10 19.7294 11 20.5 12 20.5C13 20.5 14 19.7294 15.0383 18.9109C17.9806 16.5914 22 14 22 9.1371C22 4.27416 16.4998 0.825464 12 5.50063C7.50016 0.825464 2 4.27416 2 9.1371Z" fill="currentColor"/>
            </svg>
          </a>
        </div>
      </div>
    </header>
    <main class="main">
        <div class="main__container">
            <h1 class="main__title">Вход</h1>
            <form class="login__form" id="login-form">
                <input class="input" type="text" name="username" autocomplete="username" placeholder="Никнейм" required />
                <input class="input" type="password" name="password" autocomplete="new-password" placeholder="Пароль" required />
                <button class="btn" type="submit">Войти</button>
            </form>
        </div>
    </main>
    <script type="module" src="/src/theme/theme-toggle.js"></script>
  </body>
</html>
