<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Boldonse&family=Jost:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/header.css" />
    <link rel="stylesheet" href="/styles/main.css" />
    <link rel="stylesheet" href="/pages/registration/css/styles.css" />
    <script src="/pages/registration/js/registration.js" defer></script>
  </head>
  <body>
      <header class="header">

      <div class="header__content">
        <div class="header__logo">
          <a class="logo__link" href="/">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path opacity="0.5" d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 13.5997 2.37562 15.1116 3.04346 16.4525C3.22094 16.8088 3.28001 17.2161 3.17712 17.6006L2.58151 19.8267C2.32295 20.793 3.20701 21.677 4.17335 21.4185L6.39939 20.8229C6.78393 20.72 7.19121 20.7791 7.54753 20.9565C8.88837 21.6244 10.4003 22 12 22Z" fill="#ffb2c2"/>
              <path d="M7.5 11.1093C7.5 12.4777 8.81884 13.9135 10.0286 14.9426C10.8524 15.6435 11.2644 15.9939 12 15.9939C12.7356 15.9939 13.1476 15.6435 13.9714 14.9426C15.1812 13.9135 16.5 12.4777 16.5 11.1093C16.5 8.43212 14.0249 7.4326 12 9.50069C9.97507 7.4326 7.5 8.43212 7.5 11.1093Z" fill="#ffb2c2"/>
            </svg>
            <span>IQChat</span>
          </a>
        </div>

        <div class="header__authorization">
          <a href="/login" class="btn login-btn">
            <span>Войти</span>
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
              <path d="M7 12H17M17 12L13 8M17 12L13 16" stroke="#ffb2c2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
          </a>
        </div>
      </div>
    </header>
    <main class="main">
        <div class="main__container">
            <h1 class="main__title">Регистрация</h1>
            <form class="registration__form" id="registration-form">
                <input class="input" type="text" name="username" autocomplete="username" placeholder="Никнейм" required />
                <input class="input" type="password" name="password" autocomplete="new-password" placeholder="Пароль" required />
                <button class="btn" type="submit">Регистрация</button>
            </form>
        </div>
    </main>

  </body>
</html>
