<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nonograms</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <h1>Регистрация нового пользователя</h1>
        <form id="registration-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Зарегистрироваться</button>
        </form>
        <p id="registration-message" hidden></p>

        <script>
            document.getElementById('registration-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const form = e.target;
                const messageEl = document.getElementById('registration-message');
                const body = Object.fromEntries(new FormData(form));
                try {
                    const res = await fetch('/api/registration', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(body),
                        credentials: 'include',
                    });
                    const text = await res.text();
                    messageEl.hidden = false;
                    messageEl.textContent = res.ok ? text : ('Ошибка: ' + res.status + ' ' + text);
                } catch (err) {
                    messageEl.hidden = false;
                    messageEl.textContent = err instanceof Error ? err.message : String(err);
                }
            });
        </script>
  </body>
</html>
